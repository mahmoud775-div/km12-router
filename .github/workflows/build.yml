name: Build OpenWrt for KM12-007H

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch to build'
        required: true
        default: 'openwrt-24.10'
        type: choice
        options:
          - openwrt-24.10
          - openwrt-23.05
          - main

env:
  TZ: Asia/Riyadh

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev \
            libtool libyaml-dev libz-dev lrzsz mkisofs msmtp ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Clone OpenWrt source
        run: |
          BRANCH="${{ github.event.inputs.openwrt_branch }}"
          git clone --branch "$BRANCH" --depth 1 https://github.com/openwrt/openwrt.git openwrt

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply KM12-007H patches
        run: |
          cd openwrt
          cp ../files/target/linux/ramips/dts/mt7621_mercury_km12-007h.dts target/linux/ramips/dts/
          cat ../files/target/linux/ramips/image/mt7621.mk.snippet >> target/linux/ramips/image/mt7621.mk
          echo "DTS installed:"
          ls -la target/linux/ramips/dts/mt7621_mercury_km12-007h.dts
          echo "Device count in image:"
          grep -c "mercury_km12-007h" target/linux/ramips/image/mt7621.mk

      - name: Patch network config
        run: |
          cd openwrt
          python3 << 'PYEOF'
          path = 'target/linux/ramips/mt7621/base-files/etc/board.d/02_network'
          import os
          if os.path.exists(path):
              with open(path, 'r') as f:
                  content = f.read()
              if 'mercury,km12-007h' not in content:
                  snippet = '\tmercury,km12-007h)\n\t\tucidef_set_interfaces_lan_wan "lan1 lan2 lan3 lan4" "wan"\n\t\t;;\n'
                  content = content.replace('\t*)', snippet + '\t*)', 1)
                  with open(path, 'w') as f:
                      f.write(content)
                  print('Network config patched')
              else:
                  print('Network config already patched')
          else:
              print('Network config file not found, skipping')
          PYEOF

      - name: Create config
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_mercury_km12-007h=y
          CONFIG_PACKAGE_kmod-mt7615e=y
          CONFIG_PACKAGE_kmod-mt7615-firmware=y
          CONFIG_PACKAGE_wpad-openssl=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_diffutils=y
          CONFIG_PACKAGE_uboot-envtools=y
          CONFIG_PACKAGE_kmod-usb3=y
          EOF
          make defconfig
          echo "Device config check:"
          grep "mercury_km12-007h" .config

      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc) V=s || make download -j1 V=s

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Show output
        if: success()
        run: |
          cd openwrt
          ls -la bin/targets/ramips/mt7621/

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-km12-007h-firmware
          path: openwrt/bin/targets/ramips/mt7621/*km12-007h*
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            openwrt/logs/
            openwrt/.config
          retention-days: 7
